<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jax Games</title>
    <style>
        /* Basic Reset and Theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* Dark background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Header / Logo Section */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .jax { color: white; }
        .games-red { color: #ff4d4d; }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1.section-title {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* Button Grid Layout */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        /* Game Button Styling */
        .game-button {
            width: 200px;
            height: 200px;
            background-color: #1e1e1e;
            border: 3px solid transparent; /* Hidden until hover */
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
        }

        .game-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* Hover State */
        .game-button:hover {
            border-color: #ff8080; /* Light Red Outline */
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 128, 128, 0.2);
        }

        .game-button:hover img {
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="jax">JAX</span> <span class="games-red">GAMES</span>
        </div>
    </header>

    <div class="container">
        <h1 class="section-title">Popular Games</h1>

        <div class="game-grid">
            <button class="game-button">
                <img src="https://via.placeholder.com/200" alt="Game 1">
            </button>

            <button class="game-button">
                <img src="https://via.placeholder.com/200" alt="Game 2">
            </button>

            <button class="game-button">
                <img src="https://via.placeholder.com/200" alt="Game 3">
            </button>

            <button class="game-button">
                <img src="https://via.placeholder.com/200" alt="Game 4">
            </button>
        </div>
    </div>

</body>
</html>
