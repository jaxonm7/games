<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jax Games</title>
    <style>
        /* -------------------------------------------------------------
           CORE ARTIFACTS & DESIGN SYSTEM (10+ Years Experience Architecture)
        ------------------------------------------------------------- */
        :root {
            --bg-main: #078088;
            --bg-card: #122326;
            --border-glow: #00e5ff;
            --border-dim: #004d56;
            --text-cyan: #80deea;
            --active-glow: #b2f5ea;
            
            --transition-main: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            --transition-card: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Smooth Reset & Hardware Acceleration Preparation */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e0f7fa;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Global Blur Filter Layer - Targets the entire content structure safely */
        .page-wrapper {
            transition: filter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: filter;
            width: 100%;
            min-height: 100vh;
        }

        /* Triggers via JS: Blurs out the rest of the website smoothly */
        body.is-cinematic-loading .page-wrapper {
            filter: blur(12px) brightness(0.4);
            pointer-events: none;
        }

        /* -------------------------------------------------------------
           HEADER & LAYOUT
        ------------------------------------------------------------- */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 50px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            user-select: none;
        }

        .jax { color: #ffffff; }
        .games-cyan { 
            color: var(--border-glow); 
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px 80px 40px;
            text-align: center;
        }

        h1.section-title {
            font-size: 2.8rem;
            margin-bottom: 60px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 3px solid #004d40;
            display: inline-block;
            padding-bottom: 12px;
            color: var(--text-cyan);
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* -------------------------------------------------------------
           GRID & CARD STYLING
        ------------------------------------------------------------- */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .game-link {
            text-decoration: none;
            display: block;
            outline: none;
        }

        .game-button {
            position: relative;
            width: 200px;
            height: 200px;
            background-color: var(--bg-card);
            border: 4px solid var(--border-dim);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-card);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            will-change: transform, border-color, box-shadow;
        }

        .game-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* Hover States */
        .game-link:hover .game-button {
            border-color: var(--border-glow); 
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 16px 35px rgba(0, 229, 255, 0.35);
        }

        .game-link:hover .game-button img {
            transform: scale(1.05);
        }

        /* -------------------------------------------------------------
           CINEMATIC HERO LOAD OVERLAY (The Focus Element)
        ------------------------------------------------------------- */
        .cinematic-portal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Clone dynamic target wrapper created by JS */
        .focus-clone {
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: var(--bg-card);
            border: 4px solid var(--active-glow);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(178, 245, 234, 0.8);
            transition: var(--transition-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        /* Zoom Destination executed elegantly via JS classes */
        .focus-clone.is-zoomed {
            transform: scale(1.6); /* Perfectly zooms into center without blurring */
            box-shadow: 0 0 70px rgba(178, 245, 234, 0.9), 0 0 120px rgba(0, 229, 255, 0.4);
        }

        .focus-clone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(1px) brightness(0.7);
        }

        /* Loading UI locked inside the cloned breakout frame */
        .portal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 20, 22, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(0, 229, 255, 0.15);
            border-top: 4px solid var(--border-glow);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        .loading-text {
            color: var(--border-glow);
            font-weight: 800;
            font-size: 0.95rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulseText 1.2s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

        /* -------------------------------------------------------------
           KEYFRAMES
        ------------------------------------------------------------- */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

        </div>
    </div>

    <div class="cinematic-portal" id="cinematicPortal"></div>

    <script>
        document.querySelectorAll('.game-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Pause standard anchor transition

                const btn = this.querySelector('.game-button');
                const img = btn.querySelector('img');
                const targetUrl = this.href;
                const portal = document.getElementById('cinematicPortal');

                // Get exact pixel location of clicked button relative to client viewport
                const rect = btn.getBoundingClientRect();

                // Create clean HTML element instance clone safely outside main layouts
                const clone = document.createElement('div');
                clone.className = 'focus-clone';
                
                // Spawn the clone exactly over the original button layout position
                clone.style.top = `${rect.top}px`;
                clone.style.left = `${rect.left}px`;

                // Re-inject layout templates with beautiful loader overlay components
                clone.innerHTML = `
                    <div class="portal-overlay">
                        <div class="spinner"></div>
                        <div class="loading-text">Loading</div>
                    </div>
                    <img src="${img.getAttribute('src')}" alt="Loading Focus">
                `;

                portal.appendChild(clone);

                // Hide original card quietly in background to avoid layouts doubling up
                btn.style.opacity = '0';

                // Activate page blur wrapper
                document.body.classList.add('is-cinematic-loading');

                // Force a micro-layout recalculation render frame (Standard Senior JS Practice)
                requestAnimationFrame(() => {
                    // Calculate exact alignment paths right to center screen coordinates
                    const centerX = window.innerWidth / 2 - rect.width / 2;
                    const centerY = window.innerHeight / 2 - rect.height / 2;

                    // Fly smoothly to screen center and activate layout scale metrics
                    clone.style.top = `${centerY}px`;
                    clone.style.left = `${centerX}px`;
                    clone.classList.add('is-zoomed');
                });

                // Complete pipeline execute routine and relocate
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1400);
            });
        });
    </script>
        
</body>
</html>
